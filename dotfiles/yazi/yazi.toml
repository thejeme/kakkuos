[manager]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"
ratio = [1, 3, 4]

[preview]
max_width = 1200
max_height = 1800
cache_dir = "~/.cache/yazi"

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" }
]
open = [
  { run = 'xdg-open "$@"', orphan = true, for = "unix" }
]
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" }
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "image/*", use = "open" },
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },
  { name = "*.pdf", use = "open" }
]

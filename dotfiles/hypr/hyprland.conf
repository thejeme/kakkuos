# Kakku Hyprland defaults

monitor=,preferred,auto,1

$mod = SUPER
$terminal = alacritty
$fileManager = dolphin
$menu = rofi -show drun

exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start hyprsunset

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

input {
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }

    sensitivity = 0
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(7aa2f7ff) rgba(9ece6aff) 45deg
    col.inactive_border = rgba(565f89aa)
    layout = dwindle
}

decoration {
    rounding = 6

    blur {
        enabled = true
        size = 4
        passes = 2
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(11111baa)
    }
}

animations {
    enabled = true
    bezier = kakku, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, kakku
    animation = border, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, kakku
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, E, exec, $fileManager
bind = $mod SHIFT, E, exec, alacritty -e yazi
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, layoutmsg, togglesplit
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, M, exec, kakku power
bind = $mod SHIFT, T, exec, kakku theme menu
bind = , Print, exec, kakku screenshot region
bind = SHIFT, Print, exec, kakku screenshot full

bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3

workspace = 1, default:true
workspace = 2
workspace = 3

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule = suppressevent maximize, class:.*
windowrule = float, class:^(pavucontrol)$

source = ~/.config/hypr/theme.conf

[general]
import = ["~/.config/alacritty/theme.toml"]

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 11.0

[window]
padding = { x = 8, y = 8 }

[scrolling]
history = 10000

[bell]
duration = 0

[cursor]
style = { shape = "Block" }

[[keyboard.bindings]]
key = "Left"
mods = "Control"
chars = "\u001bb"

[[keyboard.bindings]]
key = "Right"
mods = "Control"
chars = "\u001bf"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

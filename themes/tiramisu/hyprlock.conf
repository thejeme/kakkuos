background {
    monitor =
    path = ~/.config/hypr/wallpaper.png
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 280, 56
    position = 0, -90
    halign = center
    valign = center
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.18
    outer_color = rgba(d6a15fff)
    inner_color = rgba(17120fee)
    font_color = rgba(eadfceff)
    placeholder_text = Password
    fail_text = Try again
}

label {
    monitor =
    text = KakkuOS
    color = rgba(eadfceff)
    font_size = 34
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}
